name: traveling
description: "A simple travel app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^7.1.2
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  record: ^6.1.2
  audioplayers: ^6.4.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/img/icono-traveling.png"

flutter:
  uses-material-design: true

  assets:
    - assets/img/
